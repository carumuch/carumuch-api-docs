      tags:
      - Body Shop
      summary: 공업사 등록
      description: "## 공업사 등록 기능 \n### 설명 \n- 공업사 사용자로 변환됩니다.\n- 공업사 기본 정보와 위치 정보를\
        \ 함께 등록합니다.\n- 등록 완료 시 생성된 공업사 식별자를 반환합니다."
      operationId: 공업사_등록_
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/RegisterBodyShopRequest"
            examples:
              공업사_등록_2xx:
                value: "{\"name\":\"차박고 차량 수리 전문\",\"description\":\"확실하게 처리해드립니다\
                  .\",\"phoneNumber\":\"000-1234-1234\",\"locationRequest\":{\"sido\"\
                  :\"서울시\",\"sigungu\":\"송파구\",\"bname\":\"신천동\",\"jibunAddress\"\
                  :\"서울 송파구 신천동 29-1\",\"roadAddress\":\"서울 송파구 올림픽1로 300\",\"detail\"\
                  :\"1층\"},\"link\":\"https:test.com\",\"pickupAvailable\":true}"
              공업사_등록_4xx_사용자를_찾지_못한_경우:
                value: "{\"name\":\"차박고 차량 수리 전문\",\"description\":\"확실하게 처리해드립니다\
                  .\",\"phoneNumber\":\"000-1234-1234\",\"locationRequest\":{\"sido\"\
                  :\"서울시\",\"sigungu\":\"송파구\",\"bname\":\"신천동\",\"jibunAddress\"\
                  :\"서울 송파구 신천동 29-1\",\"roadAddress\":\"서울 송파구 올림픽1로 300\",\"detail\"\
                  :\"1층\"},\"link\":\"https:test.com\",\"pickupAvailable\":true}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              examples:
                공업사_등록_2xx:
                  value: |-
                    {
                      "message" : "OK",
                      "data" : 1
                    }
        "404":
          description: "404"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                공업사_등록_4xx_사용자를_찾지_못한_경우:
                  value: |-
                    {
                      "message" : "User을(를) 찾을 수 없습니다.",
                      "data" : null
                    }
