openapi: 3.0.1
info:
  title: 🚘 카우머치 Car U Much
  description: 카우머치 서비스의 API 문서입니다.
  version: 2026.04.23 21:24
servers:
- url: https://hosting-not-yet
- url: http://localhost:8080
tags: []
paths:
  /auth/login:
    post:
      tags:
      - Identity - Auth
      summary: 로그인
      description: "## 로그인 기능\n### 사용법 \n- 필드의 validation을 확인해주세요.\n- accessToken은\
        \ Authorization 헤더로 전송됩니다.\n- refreshToken은 쿠키로 전송되어 브라우저에 삽입됩니다.\n### 필독\
        \ \n- accessToken이란? 권한이 필요한 API에 함께 보내야되는 인증 토큰입니다.\n- refreshToken이란? accessToken이\
        \ 만료되어 새로 발급받아야할 때 사용되는 토큰입니다.\n"
      operationId: 로그인_
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/AuthenticateUserRequest"
            examples:
              로그인_4xx_요청_데이터_유효성_검사_실패:
                value: "{\"loginId\":\"test1\",\"password\":\"1234\"}"
              로그인_4xx_아이디_존재하지_않음:
                value: "{\"loginId\":\"test1\",\"password\":\"test1@1234\"}"
              로그인_2xx:
                value: "{\"loginId\":\"test1\",\"password\":\"test1@1234\"}"
              로그인_4xx_비밀번호가_올바르지_않음:
                value: "{\"loginId\":\"test1\",\"password\":\"wrong1234@\"}"
      responses:
        "400":
          description: "400"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                로그인_4xx_요청_데이터_유효성_검사_실패:
                  value: |-
                    {
                      "message" : "password의 필드 값 유효하지 않습니다.",
                      "data" : null
                    }
                로그인_4xx_아이디_존재하지_않음:
                  value: |-
                    {
                      "message" : "아이디 혹은 비밀번호가 일치하지 않습니다.",
                      "data" : null
                    }
                로그인_4xx_비밀번호가_올바르지_않음:
                  value: |-
                    {
                      "message" : "아이디 혹은 비밀번호가 일치하지 않습니다.",
                      "data" : null
                    }
        "200":
          description: "200"
          headers:
            Authorization:
              description: 엑세스 토큰입니다.
              schema:
                type: string
            Set-Cookie:
              description: 재발급 토큰 쿠키입니다.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              examples:
                로그인_2xx:
                  value: |-
                    {
                      "message" : "OK",
                      "data" : null
                    }
  /auth/logout:
    post:
      tags:
      - Identity - Auth
      summary: 로그아웃
      description: '- 로그아웃 입니다. 브라우저 쿠키를 초기화 합니다.'
      operationId: 로그아웃_2xx
      responses:
        "200":
          description: "200"
          headers:
            Set-Cookie:
              description: 초기화 쿠키 입니다.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              examples:
                로그아웃_2xx:
                  value: |-
                    {
                      "message" : "OK",
                      "data" : null
                    }
  /auth/reissue:
    post:
      tags:
      - Identity - Auth
      summary: 재발급
      description: "## 재발급 기능 \n### 사용법 \n- 재발급 시 새로운 엑세스 토큰을 헤더에 응답합니다.\n- 401이 뜬\
        다면, 재로그인이 필요합니다.\n"
      operationId: 재발급_2xx토큰_재발급_4xx_서버의_정보와_요청_재발급_토큰이_다른_경우토큰_재발급_4xx_재발급_토큰_쿠키가_전송되지_않음토큰_재발급_4xx_재발급_토큰이_서버에_존재하지_않은_경우
      responses:
        "401":
          description: "401"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                토큰_재발급_4xx_재발급_토큰_쿠키가_전송되지_않음:
                  value: |-
                    {
                      "message" : "쿠키가 유효하지 않습니다.",
                      "data" : null
                    }
                토큰_재발급_4xx_서버의_정보와_요청_재발급_토큰이_다른_경우:
                  value: |-
                    {
                      "message" : "토큰이 유효하지 않습니다.",
                      "data" : null
                    }
                토큰_재발급_4xx_재발급_토큰이_서버에_존재하지_않은_경우:
                  value: |-
                    {
                      "message" : "토큰이 유효하지 않습니다.",
                      "data" : null
                    }
        "200":
          description: "200"
          headers:
            Authorization:
              description: 새로운 엑세스 토큰입니다.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              examples:
                재발급_2xx:
                  value: |-
                    {
                      "message" : "OK",
                      "data" : null
                    }
  /auth/id/find:
    post:
      tags:
      - Identity - Auth
      summary: 아이디 찾기
      description: "## 아이디 찾기 기능 \n### 설명 \n- 해당하는 이메일에 아이디를 전송합니다.\n"
      operationId: 아이디_찾기_
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/RetrieveLoginIdRequest"
            examples:
              아이디_찾기_2xx:
                value: "{\"email\":\"test1@gmail.com\"}"
              아이디_찾기_4xx_이메일에_해당하는_사용자가_없는_경우:
                value: "{\"email\":\"test1@gmail.com\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              examples:
                아이디_찾기_2xx:
                  value: |-
                    {
                      "message" : "OK",
                      "data" : null
                    }
        "404":
          description: "404"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                아이디_찾기_4xx_이메일에_해당하는_사용자가_없는_경우:
                  value: |-
                    {
                      "message" : "User을(를) 찾을 수 없습니다.",
                      "data" : null
                    }
  /auth/password/find:
    post:
      tags:
      - Identity - Auth
      summary: 1. 비밀번호 찾기
      description: "## 1. 비밀번호 찾기 기능 \n### 사용법 \n- 해당하는 이메일에 인증번호를 전송합니다.\n- 해당하는\
        \ 인증번호를 비밀번호 찾기 인증번호 검증 요청에 사용해주세요.\n"
      operationId: 비밀번호_찾기_
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/RetrievePasswordRequest"
            examples:
              비밀번호_찾기_2xx:
                value: "{\"loginId\":\"test1\",\"email\":\"test1@gmail.com\"}"
              비밀번호_찾기_4xx_데이터에_해당하는_사용자가_없는_경우:
                value: "{\"loginId\":\"test1\",\"email\":\"test1@gmail.com\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              examples:
                비밀번호_찾기_2xx:
                  value: |-
                    {
                      "message" : "OK",
                      "data" : null
                    }
        "404":
          description: "404"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                비밀번호_찾기_4xx_데이터에_해당하는_사용자가_없는_경우:
                  value: |-
                    {
                      "message" : "User을(를) 찾을 수 없습니다.",
                      "data" : null
                    }
  /auth/password/reset:
    post:
      tags:
      - Identity - Auth
      summary: 3. 비밀번호 초기화
      description: "## 3. 비밀번호 초기화 기능 \n### 사용법 \n- 인증번호를 통해 얻은 임시 토큰을 통해 사용자의 비밀번\
        호를 새롭게 초기화 합니다.\n"
      operationId: 비밀번호_초기화_
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
            examples:
              비밀번호_초기화_4xx_토큰이_올바르지_않은_경우:
                value: "{\"token\":\"wrongToken\",\"password\":\"test1@1234\"}"
              비밀번호_초기화_2xx:
                value: "{\"token\":\"testToken\",\"password\":\"test1@1234\"}"
      responses:
        "401":
          description: "401"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                비밀번호_초기화_4xx_토큰이_올바르지_않은_경우:
                  value: |-
                    {
                      "message" : "토큰이 유효하지 않습니다.",
                      "data" : null
                    }
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              examples:
                비밀번호_초기화_2xx:
                  value: |-
                    {
                      "message" : "OK",
                      "data" : null
                    }
  /auth/password/verify:
    post:
      tags:
      - Identity - Auth
      summary: 2. 인증번호 검증
      description: "## 2. 인증 번호 검증 기능 \n### 사용법 \n- 비밀번호 찾기를 통해 얻은 인증 번호를 검증합니다.\n\
        - 인증 번호가 인증되면 유효기간 10분의 임시 토큰이 발행됩니다.\n"
      operationId: 인증번호_검증_
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/auth-password-verify901416538"
            examples:
              인증번호_검증_4xx_인증번호가_올바르지_않은_경우:
                value: "{\"loginId\":\"test1\",\"code\":\"654321\"}"
              인증번호_검증_2xx:
                value: "{\"loginId\":\"test1\",\"code\":\"123456\"}"
      responses:
        "400":
          description: "400"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                인증번호_검증_4xx_인증번호가_올바르지_않은_경우:
                  value: |-
                    {
                      "message" : "인증번호가 올바르지 않습니다.",
                      "data" : null
                    }
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyPasswordCodeResponse"
              examples:
                인증번호_검증_2xx:
                  value: |-
                    {
                      "message" : "OK",
                      "data" : {
                        "token" : "testToken"
                      }
                    }
  /body-shops:
