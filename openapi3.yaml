  /damage-reports:
    get:
      tags:
      - Damage - Report
      summary: 사고 레포트 전체 목록 조회
      description: "## 사고 레포트 목록 조회 기능 \n### 사용법 \n- size는 10 ~ 100입니다. 만약 다른 값이 들\
        어오면 10개로 고정합니다.\n- page가 없거나, 음수라면 첫 페이지로 고정합니다."
      operationId: 사고_레포트_전체_목록_조회_2xx_
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagingResponse"
              examples:
                사고_레포트_전체_목록_조회_2xx_두번째_페이지:
                  value: |-
                    {
                      "message" : "OK",
                      "data" : {
                        "content" : [ {
